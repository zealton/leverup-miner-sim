<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeverUp 矿机 · 产品交互原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a; --panel:#131313; --panel2:#191919; --border:#2a2a2a;
  --acid:#C7F50D; --acid2:#CCFF00; --red:#FA5000; --blue:#8ab4ff; --gold:#f5c518;
  --text:#f0f0f0; --muted:#8a8a8a; --dim:#4a4a4a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}

/* app shell: top nav imitating app.leverup.xyz */
.topnav{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:20px;height:54px;padding:0 18px;
  background:#0b0b0b;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;white-space:nowrap}
.logo .bars{display:flex;align-items:flex-end;gap:2px;height:16px}
.logo .bars i{width:4px;background:var(--acid);border-radius:1px}
.logo .bars i:nth-child(1){height:7px}.logo .bars i:nth-child(2){height:11px}.logo .bars i:nth-child(3){height:16px}
.logo span b{color:var(--acid)}
.navitems{display:flex;align-items:center;gap:4px;flex:1;min-width:0;overflow-x:auto;scrollbar-width:none}
.navitems::-webkit-scrollbar{display:none}
.nv{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;
  padding:8px 12px;border-radius:10px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nv:hover{color:var(--text)}
.nv.on{color:var(--acid);background:rgba(199,245,13,.08)}
.nv .new{font-size:9px;background:var(--red);color:#fff;padding:1px 5px;border-radius:99px;font-weight:700;letter-spacing:.04em}
.navright{display:flex;align-items:center;gap:10px;white-space:nowrap;font-variant-numeric:tabular-nums}
.chip{font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);padding:6px 11px;border-radius:10px}
.chip b{color:var(--text)}
.wallet{font-size:13px;font-weight:700;background:var(--acid);color:#0a0a0a;border:none;padding:8px 14px;border-radius:10px;cursor:pointer}
@media(max-width:900px){.navitems .nv:not(.on){display:none}.topnav{gap:12px}}

/* content shell */
.shell{max-width:1360px;margin:0 auto;padding:18px 16px 96px}
@media(min-width:1024px){.shell{padding-bottom:32px}}
.desk{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
@media(max-width:1359px){.desk{grid-template-columns:repeat(2,1fr)}}
.dcol{min-width:0}

/* bottom tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(13,13,13,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:10px 8px 18px;z-index:30}
@media(min-width:1024px){.tabs{display:none}}
.tabs button{flex:1;background:none;border:none;color:var(--dim);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tabs button .ic{font-size:20px;line-height:1}
.tabs button.on{color:var(--acid)}

/* cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px}
.card.hl{border-color:var(--acid);background:linear-gradient(180deg,rgba(199,245,13,.06),transparent 55%),var(--panel)}
h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:800;letter-spacing:.02em}
h2{font-size:16px;font-weight:700;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px}
.big{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:34px;font-weight:800;color:var(--acid);line-height:1.1;letter-spacing:-.01em}
.mono{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-weight:600}

/* onboarding steps */
.step{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px dashed #222}
.step:last-child{border-bottom:none}
.step .ic{font-size:26px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border-radius:12px;flex:none}
.step b{display:block;font-size:14.5px}
.step span{font-size:12.5px;color:var(--muted);line-height:1.55;display:block;margin-top:2px}
.step span i{color:var(--acid);font-style:normal;font-weight:600}

/* buttons */
.btn{display:block;width:100%;padding:15px;border-radius:16px;border:none;cursor:pointer;text-align:center;
  font-family:'Inter',sans-serif;font-size:16px;font-weight:700;background:var(--acid);color:#0a0a0a;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border);font-weight:600}
.btn.mini{width:auto;display:inline-block;padding:9px 16px;font-size:13px;border-radius:12px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btnrow{display:flex;gap:10px}
.btnrow .btn{flex:1}

/* miner machine card */
.tierchip{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron',sans-serif;font-weight:800;font-size:13px;
  padding:4px 12px;border-radius:99px;border:1.5px solid}
.tierchip.A{color:#e8e8e8;border-color:#555}
.tierchip.B{color:var(--blue);border-color:var(--blue)}
.tierchip.C{color:var(--gold);border-color:var(--gold)}
.machine{position:relative;text-align:center;padding:6px 0 2px}
.machine .emoji{font-size:56px;filter:drop-shadow(0 6px 18px rgba(199,245,13,.25))}
.machine.stopped .emoji{filter:grayscale(1) opacity(.5)}
.pulse{animation:pp 1.6s ease-in-out infinite}
@keyframes pp{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.pbar{height:14px;background:#0d0d0d;border:1px solid var(--border);border-radius:99px;overflow:hidden;position:relative;margin:10px 0 6px}
.pbar i{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,#8a9b12,var(--acid));border-radius:99px;transition:width .5s}
.pbar.warn i{background:linear-gradient(90deg,#7a2f10,var(--red))}
.rowline{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);padding:5px 0;border-bottom:1px dashed #1e1e1e}
.rowline:last-child{border-bottom:none}
.rowline b{color:var(--text);font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-weight:650}
.rowline b.pos{color:var(--acid)} .rowline b.neg{color:var(--red)}
.deadline{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding:9px;border-radius:12px;
  background:var(--panel2);font-size:13px;color:var(--muted)}
.deadline.warn{background:rgba(250,80,0,.12);color:var(--red);font-weight:600}

/* gears */
.gears{display:flex;gap:10px;margin-top:12px}
.gear{flex:1;background:var(--panel2);border:1.5px solid var(--border);border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s}
.gear.on{border-color:var(--acid);background:rgba(199,245,13,.08)}
.gear .g{font-family:'Orbitron',sans-serif;font-weight:800;font-size:20px}
.gear.on .g{color:var(--acid)}
.gear .n{font-size:12px;font-weight:600;margin-top:2px}
.gear .d{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.45}
.speedo{text-align:center;margin:6px 0 2px}
.speedo .v{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:42px;font-weight:800;color:var(--acid);letter-spacing:-.02em}
.speedo .v.slow{color:var(--muted)} .speedo .v.zero{color:var(--red)}
.speedo .l{font-size:11px;color:var(--dim);letter-spacing:.2em;font-family:'IBM Plex Mono',monospace}

/* lottery */
.slotbox{text-align:center;padding:10px 0}
.slotcard{width:150px;height:190px;margin:0 auto 14px;border-radius:20px;border:2px solid var(--border);background:var(--panel2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-family:'Orbitron',sans-serif;font-weight:900;font-size:44px;
  transition:all .3s}
.slotcard.spin{animation:sp .12s linear infinite}
@keyframes sp{0%{transform:rotateX(0)}100%{transform:rotateX(360deg)}}
.slotcard.win{border-color:var(--acid);box-shadow:0 0 40px rgba(199,245,13,.35)}
.slotcard.winC{border-color:var(--gold);box-shadow:0 0 50px rgba(245,197,24,.45)}
.slotcard small{font-size:12px;font-family:'Inter',sans-serif;font-weight:600;color:var(--muted)}
.probbar{display:flex;height:12px;border-radius:99px;overflow:hidden;margin:10px 0 6px;border:1px solid var(--border)}
.probbar i{display:block;height:100%}
.problegend{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}

/* tier rarity treatments */
.card.tierB{border-color:var(--blue);box-shadow:0 0 26px rgba(138,180,255,.16),inset 0 0 50px rgba(138,180,255,.05)}
.card.tierC{border-color:var(--gold);box-shadow:0 0 36px rgba(245,197,24,.22),inset 0 0 70px rgba(245,197,24,.07);position:relative;overflow:hidden}
.card.tierC::after{content:"";position:absolute;top:-160%;left:-70%;width:46%;height:420%;transform:rotate(25deg);pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(245,197,24,.14),transparent);animation:sweep 3.2s ease-in-out infinite}
@keyframes sweep{0%{left:-70%}55%,100%{left:135%}}
.tierchip.B{box-shadow:0 0 12px rgba(138,180,255,.35)}
.tierchip.C{box-shadow:0 0 16px rgba(245,197,24,.5)}
.rarline{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;margin-top:8px;text-transform:uppercase}
.machine .emoji.szB{font-size:64px;filter:drop-shadow(0 6px 22px rgba(138,180,255,.45))}
.machine .emoji.szC{font-size:74px;filter:drop-shadow(0 8px 28px rgba(245,197,24,.55))}
.tiers3{display:flex;gap:10px;margin:12px 0 4px}
.t3{flex:1;border-radius:16px;padding:12px 6px;text-align:center;border:1.5px solid var(--border);background:var(--panel2);position:relative}
.t3 .e{font-size:30px;line-height:1.2}
.t3 .nm{font-family:'Orbitron',sans-serif;font-weight:800;font-size:15px;margin-top:4px}
.t3 .amt{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:11.5px;color:var(--text);margin-top:3px}
.t3 .sup{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}
.t3.you::before{content:"你在这";position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:9px;background:var(--acid);color:#000;padding:1px 8px;border-radius:99px;font-weight:700}
.t3.B{border-color:var(--blue);box-shadow:0 0 14px rgba(138,180,255,.18)}
.t3.B .nm{color:var(--blue)}
.t3.C{border-color:var(--gold);box-shadow:0 0 20px rgba(245,197,24,.3);background:linear-gradient(180deg,rgba(245,197,24,.08),var(--panel2))}
.t3.C .nm{color:var(--gold)}
.arrowup{display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;padding:0 0 2px}

/* vault */
.bigrow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.tag{display:inline-block;font-size:10.5px;padding:2px 9px;border-radius:99px;border:1px solid var(--acid);color:var(--acid);font-weight:600;letter-spacing:.06em}

/* toast & modal */
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#1c1c1c;border:1px solid var(--acid);
  color:var(--text);font-size:13px;padding:10px 18px;border-radius:14px;display:none;z-index:60;white-space:nowrap;box-shadow:0 10px 30px rgba(0,0,0,.6)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;z-index:50}
.overlay .sheet{max-width:520px}
.overlay.show{display:flex}
.sheet{background:var(--panel);border-top:1px solid var(--acid);border-radius:24px 24px 0 0;padding:22px 20px 30px;width:100%;max-height:82%;overflow-y:auto}
.sheet h2{margin-bottom:10px}

/* demo console */
.console{width:230px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;
  position:fixed;right:16px;top:70px;z-index:45;display:none;box-shadow:0 16px 50px rgba(0,0,0,.6)}
.console.open{display:block}
@media(min-width:1520px){.console{display:block}#con_toggle{display:none}}
#con_toggle{position:fixed;right:16px;top:64px;z-index:46;width:40px;height:40px;border-radius:12px;
  background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:17px;cursor:pointer}
.console h3{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.console .btn{margin-bottom:8px;padding:10px;font-size:13px}
.console .k{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #1e1e1e}
.console .k b{color:var(--text)}
.console a{color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace}

</style>
</head>
<body>

<nav class="topnav">
  <div class="logo"><span class="bars"><i></i><i></i><i></i></span><span>Lever <b>Up</b></span></div>
  <div class="navitems">
    <button class="nv">📊 Trade</button>
    <button class="nv">💵 LVUSD</button>
    <button class="nv">🟣 LVMON</button>
    <button class="nv">🎁 LV Airdrop</button>
    <button class="nv">🏆 Competition</button>
    <button class="nv on">⛏ Miner <span class="new">NEW</span></button>
  </div>
  <div class="navright">
    <span class="chip">LV <b id="sb_price">$0.0533</b></span>
    <span class="chip"><b id="sb_mon">20,000</b> MON</span>
    <button class="wallet">0x3F…9A2C</button>
  </div>
</nav>

<main class="shell"><div id="app"></div></main>

<div class="tabs">
  <button data-v="home" class="on"><span class="ic">⛏</span>矿机</button>
  <button data-v="boost"><span class="ic">📈</span>战绩</button>
  <button data-v="lotto"><span class="ic">🎰</span>抽卡</button>
  <button data-v="vault"><span class="ic">🏦</span>金库</button>
</div>

<div id="toast"></div>
<div class="overlay" id="sheet_ov"><div class="sheet" id="sheet"></div></div>

<button id="con_toggle" title="演示控制台">🎛</button>
<div class="console" id="console">
  <h3>演示控制台（非产品）</h3>
  <button class="btn ghost" id="c_d1">⏩ 快进 1 天</button>
  <button class="btn ghost" id="c_d7">⏩⏩ 快进 7 天</button>
  <button class="btn ghost" id="c_chance">🎁 +1 抽卡机会</button>
  <button class="btn ghost" id="c_reset">↺ 重置演示</button>
  <div style="margin-top:10px">
    <div class="k"><span>DAY</span><b id="c_day">0</b></div>
    <div class="k"><span>油门下限</span><b id="c_floor">1×（宽限期）</b></div>
    <div class="k"><span>抽卡机会</span><b id="c_ch">0</b></div>
  </div>
  <p style="font-size:11px;color:var(--dim);margin-top:12px;line-height:1.7">真实产品里时间自然流逝；此面板仅用于演示状态切换。参数与<a href="/">数值模拟器</a>一致。</p>
</div>

<script>
const $=id=>document.getElementById(id);
const fmtLV=v=>{const a=Math.abs(v);return a>=100?Math.round(a).toLocaleString('en-US'):a.toFixed(1)};
const fmtU=v=>{const a=Math.abs(v);const t=a>=1000?Math.round(a).toLocaleString('en-US'):a.toFixed(2);return(v<0?'−$':'$')+t};
const fmtDec=v=>v>=100?Math.round(v).toLocaleString('en-US'):v.toFixed(1);

/* ---- constants (aligned with simulator defaults) ---- */
const PLV=0.0533, PRICE_MON=8000, PRICE_USD=200, T=100, FLOOR_DAY=42;
const TIERS={
  A:{total:5000,color:'#e8e8e8',emoji:'⛏',sz:'',rar:'STANDARD',cn:'常规款',mult:'基础产量',supply:'首批 800 台'},
  B:{total:12500,color:'#8ab4ff',emoji:'🦾',sz:'szB',rar:'RARE',cn:'稀有款',mult:'产量 ×2.5',supply:'全网限量 120 台'},
  C:{total:31000,color:'#f5c518',emoji:'💎',sz:'szC',rar:'LEGENDARY',cn:'传说款',mult:'产量 ×6.2',supply:'全网仅 20 台'}};
const GEARS={
  Z:{v:0,pnl:0,name:'没交易',emoji:'🛌',desc:'不开单',fee:0},
  L:{v:50000,pnl:0,name:'交易但亏',emoji:'😵',desc:'交易 $50,000/周',fee:10},
  W:{v:50000,pnl:2000,name:'小赚',emoji:'🙂',desc:'赚 $2,000/周',fee:10},
  B:{v:200000,pnl:20000,name:'大赚',emoji:'🐳',desc:'赚 $20,000/周',fee:40}};
const PNL_POOL=400000;
const NET_VOL=10000000, SMAX=0.01, BMAX=3, RTH=1200000, STAY=0.30, QB=120, QC=20, VE_APR=0.469;

let S;
function init(){
  S={day:0,view:'home',mon:20000,gear:'W',miner:null,chances:0,minedTotal:0,
     vault:0,wallet:0,staked:0,divid:0,feeSpent:0,lottoState:'idle',lottoResult:null,seed:99};
  render();
}
const rnd=()=>((S.seed=(S.seed*1664525+1013904223)>>>0)/4294967296);

function floorNow(){return S.day>=FLOOR_DAY?0:1}
function boostOf(gear){
  const p=GEARS[gear].pnl, share=p>0?p/(PNL_POOL+p):0, fl=floorNow();
  return fl+(BMAX-fl)*Math.min(1,share/SMAX);
}
function tick(days){
  for(let i=0;i<days;i++){
    S.day++;
    if(S.miner&&!S.miner.dead){
      const b=boostOf(S.gear);
      const rate=TIERS[S.miner.tier].total/T*b;
      const e=Math.min(S.miner.rem,rate);
      S.miner.rem-=e;S.vault+=e;S.minedTotal+=e;
      S.chances+=GEARS[S.gear].v/7/RTH;
      S.feeSpent+=GEARS[S.gear].v/7*0.0002;
      if(S.miner.rem<=0.5){S.miner.dead=true;S.miner.done=true;toast('🎉 挖完了！全部 '+fmtLV(TIERS[S.miner.tier].total)+' LV 已产出')}
      else if(S.day-S.miner.born>=T){
        S.miner.dead=true;S.miner.forfeit=S.miner.rem;S.miner.rem=0;
        toast('⏳ 100 天到期，未挖出的 '+fmtLV(S.miner.forfeit)+' LV 已消失');
      }
    }
    S.divid+=S.staked*VE_APR/365;
  }
  render();
}
function checkTx(){
  if(S.miner)return;
  if(S.mon<PRICE_MON){toast('钱包里 MON 不足 8,000');return}
  toast('🔍 正在链上检测你的转账…');
  setTimeout(()=>{
    S.mon-=PRICE_MON;
    S.miner={tier:'A',rem:TIERS.A.total,born:S.day,dead:false,forfeit:0,done:false};
    toast('✅ 检测到 8,000 MON！矿机已绑定，自动开挖');
    S.view='home';render();
  },1400);
}
function remint(){
  if(S.chances<1||!S.miner||S.miner.dead)return;
  S.chances-=1;S.lottoState='spin';render();
  setTimeout(()=>{
    const r=rnd();const cur=S.miner.tier;
    let res='stay';
    const opts=[];if(cur!=='B')opts.push(['B',QB]);if(cur!=='C')opts.push(['C',QC]);
    if(cur==='B')opts.push(['A',800]);
    const tot=opts.reduce((a,o)=>a+o[1],0);
    if(r>=STAY&&tot>0){
      let x=(r-STAY)/(1-STAY)*tot;
      for(const o of opts){if(x<o[1]){res=o[0];break}x-=o[1]}
    }
    if(res!=='stay'&&res!==cur){
      const frac=S.miner.rem/TIERS[cur].total;
      S.miner.tier=res;S.miner.rem=TIERS[res].total*frac;
    }
    S.lottoState='done';S.lottoResult=res;render();
  },1200);
}
function claim(){if(S.vault<1)return;S.wallet+=S.vault;toast('已领取 '+fmtLV(S.vault)+' LV 到钱包');S.vault=0;render()}
function stakeAll(){if(S.wallet<1)return;S.staked+=S.wallet;toast('已存入分红池，开始吃分红');S.wallet=0;render()}

/* ---- views ---- */
function vHome(compact){
  if(!S.miner)return `
    <div class="card hl" style="text-align:center;padding:26px 18px">
      <div style="font-size:54px" class="pulse">🕳️</div>
      <h1 style="margin:8px 0 6px">首批矿机 · 神秘发售</h1>
      <p class="sub" style="margin-bottom:14px">这个 App 里<b style="color:var(--text)">没有购买按钮</b>。<br>发售地址只藏在官方推特的那条推文里。</p>
      <div style="text-align:left;background:var(--panel2);border-radius:16px;padding:12px 14px;margin-bottom:14px">
        <div class="rowline"><span>🐦 第一步</span><b>找到 @LeverUpFi 置顶推文</b></div>
        <div class="rowline"><span>💸 第二步</span><b>转 恰好 8,000 MON 到推文地址</b></div>
        <div class="rowline"><span>⛏ 第三步</span><b>矿机自动出现在这里</b></div>
      </div>
      <button class="btn ghost" onclick="checkTx()">我已转账 · 检测到账 🔍</button>
      <p style="font-size:11px;color:var(--dim);margin-top:10px">已被认领 <b style="color:var(--acid)">623 / 800</b> · 一台价值 ≈ 100 天最多 5,000 LV</p>
    </div>
    <div class="card" style="border-color:#5a2a10">
      <h2 style="color:var(--red)">⚠️ 防伪三条</h2>
      <div class="step"><div class="ic">1️⃣</div><div><span style="font-size:13px">地址<i>只认官方账号置顶推文</i>——评论区、私信里的地址全是假的。</span></div></div>
      <div class="step"><div class="ic">2️⃣</div><div><span style="font-size:13px">金额必须<i>恰好 8,000 MON</i>：多转、少转、售罄后转，都会自动原路退回。</span></div></div>
      <div class="step"><div class="ic">3️⃣</div><div><span style="font-size:13px">全程<i>不需要授权任何合约</i>——就是一笔普通转账，转完矿机绑定到你的转账钱包。</span></div></div>
    </div>
    <div class="card">
      <h2>怎么玩？三句话</h2>
      <div class="step"><div class="ic">🛒</div><div><b>1. 买机器</b><span>付一次钱，机器<i>自动挖 100 天</i>，不用管它也在挖。</span></div></div>
      <div class="step"><div class="ic">📈</div><div><b>2. 赚钱提速</b><span>在 LeverUp 交易：<i>赚钱的周机器挖得快</i>（最高 3 倍速）；交易量则攒抽卡机会——亏了也不白刷。</span></div></div>
      <div class="step"><div class="ic">⏳</div><div><b>3. 到期结算</b><span>100 天一到机器退役，<i>没挖出来的部分会消失</i>——所以记得踩油门。</span></div></div>
    </div>
    <div class="card">
      <h2>还有个彩蛋 🎰</h2>
      <p class="sub">交易攒「抽卡机会」，有机会把机器升级成 <b style="color:var(--blue)">B（产量×2.5）</b>或 <b style="color:var(--gold)">C（产量×6.2）</b>——全网 B 只有 120 台、C 只有 20 台，升级后<b style="color:var(--text)">进度不清零</b>。</p>
    </div>`;

  const m=S.miner,tier=TIERS[m.tier];
  const prog=1-m.rem/tier.total;
  const daysLeft=Math.max(0,T-(S.day-m.born));
  const b=boostOf(S.gear);
  const perDay=tier.total/T*b;
  if(m.dead)return `
    <div class="card ${m.done?'hl':''}" style="text-align:center;padding:26px 18px">
      <div style="font-size:54px">${m.done?'🏆':'🪦'}</div>
      <div class="rarline" style="color:${tier.color};text-align:center">${TIERS[m.tier].emoji} ${m.tier} 级 · ${tier.cn}</div>
      <h1 style="margin:8px 0 6px">${m.done?'挖完收工！':'机器退役了'}</h1>
      <p class="sub">${m.done
        ?`这台 ${m.tier} 级机器挖出了全部 <b style="color:var(--acid)">${fmtLV(tier.total)} LV</b>`
        :`挖出 <b style="color:var(--acid)">${fmtLV(tier.total-m.forfeit)} LV</b>，有 <b style="color:var(--red)">${fmtLV(m.forfeit)} LV 没来得及挖，已消失</b>——下台记得多踩油门`}</p>
      <div style="height:14px"></div>
      <button class="btn ghost" onclick="toast('🐦 下一批发售时间与地址只会在推特公布')">蹲下一批 · 关注 @LeverUpFi</button>
    </div>
    <div class="card"><div class="rowline"><span>本季累计挖出</span><b class="pos">${fmtLV(S.minedTotal)} LV ≈ ${fmtU(S.minedTotal*PLV)}</b></div>
    <div class="rowline"><span>去金库看收益</span><b>🏦 →</b></div></div>`;

  return `
    <div class="card hl tier${m.tier}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="tierchip ${m.tier}">${TIERS[m.tier].emoji} ${m.tier} 级 · ${TIERS[m.tier].cn}</span>
        <span class="sub mono">#0001</span>
      </div>
      <div class="rarline" style="color:${tier.color}">${tier.rar} · ${tier.mult} · ${tier.supply}</div>
      <div class="machine ${b<=0?'stopped':''}"><div class="emoji ${tier.sz} ${b>0?'pulse':''}">${b>0?tier.emoji:'😴'}</div></div>
      <div class="bigrow"><span class="big">${fmtLV(tier.total-m.rem)}</span><span class="sub">/ ${fmtLV(tier.total)} LV</span></div>
      <div class="pbar ${daysLeft<=21?'warn':''}"><i style="width:${(prog*100).toFixed(1)}%"></i></div>
      <div class="rowline"><span>今天的产出</span><b class="${b>0?'pos':'neg'}">${b>0?'+'+fmtDec(perDay)+' LV ≈ '+fmtU(perDay*PLV):'0（机器停了）'}</b></div>
      <div class="rowline"><span>当前速度</span><b>${b.toFixed(2)} 倍速 ${b>=2.9?'🔥':b>0?'':'⚠️'}</b></div>
      <div class="rowline"><span>已换算成钱</span><b class="pos">≈ ${fmtU((tier.total-m.rem)*PLV)}</b></div>
      ${m.tier!=='A'?`<div class="rowline"><span>比 A 级多产</span><b style="color:${tier.color}">+${fmtLV(tier.total-TIERS.A.total)} LV（同样 100 天）</b></div>`:''}
      <div class="deadline ${daysLeft<=21?'warn':''}">⏳ 还剩 <b class="mono" style="font-size:16px">&nbsp;${daysLeft}&nbsp;</b> 天${daysLeft<=21?' · 到期没挖完的会消失！':'，到期后没挖完的部分会消失'}</div>
      ${b<=0?'<div style="height:10px"></div><button class="btn" onclick="go(\'boost\')">😱 本周没盈利，机器停了！→</button>':''}
    </div>
    ${compact?'':`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><h2>🎰 抽卡机会 <b class="mono" style="color:var(--acid)">${Math.floor(S.chances)}</b> 次</h2>
        <p class="sub" style="font-size:12px">升级 B/C 产量翻倍，进度不清零</p></div>
        <button class="btn mini" ${Math.floor(S.chances)<1?'disabled':''} onclick="go('lotto')">去抽卡</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><h2>🏦 待领取 <b class="mono" style="color:var(--acid)">${fmtLV(S.vault)}</b> LV</h2>
        <p class="sub" style="font-size:12px">≈ ${fmtU(S.vault*PLV)} · 可领取或存着吃分红</p></div>
        <button class="btn mini ghost" onclick="go('vault')">去金库</button>
      </div>
    </div>`}`;
}

function vBoost(){
  const fl=floorNow();
  return `
    <div class="card">
      <h1 style="margin-bottom:4px">📈 战绩 = 速度</h1>
      <p class="sub"><b style="color:var(--text)">赚钱的人挖得快</b>：你本周的盈利占全体矿工「盈利池」的比例，决定机器速度（最高 3 倍）。亏损的周只有保底速度。</p>
      <div class="speedo"><div class="v ${boostOf(S.gear)<=0?'zero':boostOf(S.gear)<1.5?'slow':''}">${boostOf(S.gear).toFixed(2)}×</div><div class="l">CURRENT SPEED</div></div>
      <div class="gears">
        ${Object.entries(GEARS).map(([k,g])=>`
          <div class="gear ${S.gear===k?'on':''}" onclick="setGear('${k}')">
            <div class="g">${g.emoji}</div><div class="n">${g.name}</div>
            <div class="d">${g.desc}<br>→ ${boostOf(k).toFixed(2)} 倍速</div>
          </div>`).join('')}
      </div>
      <p class="sub" style="font-size:11px;margin-top:8px;color:var(--dim)">（演示用四个假设情景；真实产品读取你钱包的每周实际 PnL）</p>
      <p class="sub" style="font-size:12px;margin-top:8px">${fl===1
        ?`💡 现在是<b style="color:var(--text)">宽限期</b>（前 6 周）：亏损或不交易也有 1 倍速保底。<b style="color:var(--red)">第 42 天起保底取消</b>——没盈利的周机器停转，时间照样流逝。`
        :`<b style="color:var(--red)">⚠️ 宽限期已结束</b>：本周没有盈利 = 机器停转（0 产出），但 100 天倒计时不会停。`}</p>
    </div>
    <div class="card">
      <h2>速度和抽卡是两回事</h2>
      <div class="rowline"><span>📈 盈利（正 PnL）</span><b>决定速度，占盈利池 1% = 满速</b></div>
      <div class="rowline"><span>🎰 交易量</span><b>每 $1.2M = +1 次抽卡（赚亏都算）</b></div>
      <p class="sub" style="font-size:12px;margin-top:8px">所以哪怕这周亏了，交易量也没白刷——抽卡机会照攒。</p>
    </div>`;
}

function vLotto(){
  const can=Math.floor(S.chances)>=1&&S.miner&&!S.miner.dead;
  const cur=S.miner?S.miner.tier:'A';
  let cardInner='🎴<small>消耗 1 次机会</small>',cls='';
  if(S.lottoState==='spin'){cardInner='❓';cls='spin'}
  if(S.lottoState==='done'){
    const r=S.lottoResult;
    if(r==='stay')cardInner=`😅<small>没变，还是 ${cur} 级</small>`;
    else{cardInner=`${TIERS[r].emoji}<small style="color:${TIERS[r].color};font-weight:800">${r} 级 · ${TIERS[r].cn}！</small><small>${TIERS[r].mult} · ${TIERS[r].supply}</small>`;cls=r==='C'?'winC':'win'}
  }
  return `
    <div class="card hl">
      <h1 style="text-align:center;margin-bottom:2px">🎰 升级抽卡</h1>
      <p class="sub" style="text-align:center">给矿机抽一次「变身」，<b style="color:var(--text)">进度不清零</b>：<br>挖到 60% 时升级，就从新产量的 60% 继续挖</p>
      <div class="tiers3">
        <div class="t3 ${cur==='A'?'you':''}"><div class="e">⛏</div><div class="nm">A</div><div class="amt">5,000 LV</div><div class="sup">常规 · 800 台</div></div>
        <div class="t3 B ${cur==='B'?'you':''}"><div class="e">🦾</div><div class="nm">B</div><div class="amt">12,500 LV</div><div class="sup">稀有 ×2.5<br>限量 120 台</div></div>
        <div class="t3 C ${cur==='C'?'you':''}"><div class="e">💎</div><div class="nm">C</div><div class="amt">31,000 LV</div><div class="sup">传说 ×6.2<br>全网仅 20 台</div></div>
      </div>
      <div class="slotbox">
        <div class="slotcard ${cls}" style="${S.lottoState==='done'&&S.lottoResult!=='stay'?'color:'+TIERS[S.lottoResult].color:''}">${cardInner}</div>
        <button class="btn" style="max-width:240px;margin:0 auto" ${can?'':'disabled'} onclick="remint()">
          ${can?'抽一次（剩 '+Math.floor(S.chances)+' 次机会）':'机会不足 · 去交易攒机会'}</button>
      </div>
      <div class="probbar">
        <i style="width:30%;background:#3a3a3a"></i><i style="width:60%;background:var(--blue)"></i><i style="width:10%;background:var(--gold)"></i>
      </div>
      <div class="problegend"><span>不变 30%</span><span style="color:var(--blue)">变 B 60%</span><span style="color:var(--gold)">变 C 10%</span></div>
      <p class="sub" style="font-size:11.5px;margin-top:8px;text-align:center">概率对所有人公开一致 · B 全网限量 120 台、C 限量 20 台，<b style="color:var(--text)">抽完即止</b>（额度越少越难抽到）</p>
    </div>
    <div class="card">
      <div class="rowline"><span>怎么攒机会？</span><b>每 $1.2M 交易量 = 1 次</b></div>
      <div class="rowline"><span>当前进度</span><b>${(S.chances%1*100).toFixed(0)}% → 下一次</b></div>
      <div class="rowline"><span>我的机器</span><b>${S.miner?S.miner.tier+' 级 · 已挖 '+((1-S.miner.rem/TIERS[S.miner.tier].total)*100).toFixed(0)+'%':'还没有'}</b></div>
    </div>`;
}

function vVault(){
  return `
    <div class="card hl">
      <h1 style="margin-bottom:10px">🏦 金库</h1>
      <div class="rowline"><span>⛏ 待领取（机器边挖边进）</span><b class="pos">${fmtLV(S.vault)} LV ≈ ${fmtU(S.vault*PLV)}</b></div>
      <div style="height:10px"></div>
      <div class="btnrow">
        <button class="btn ghost" ${S.vault<1?'disabled':''} onclick="claim()">领到钱包</button>
        <button class="btn" ${S.wallet<1?'disabled':''} onclick="stakeAll()">存入分红池 →</button>
      </div>
      <p class="sub" style="font-size:11.5px;margin-top:8px">💡 顺序：先「领到钱包」，再「存入分红池」吃分红；也可以领了直接卖，随你。</p>
    </div>
    <div class="card">
      <h2>💰 分红池（存币生币）</h2>
      <p class="sub" style="font-size:12.5px">协议把<b style="color:var(--text)">真实交易手续费</b>拿去回购 LV：一半分给存币的人，一半直接销毁。存进来就躺着分。</p>
      <div style="height:8px"></div>
      <div class="rowline"><span>钱包余额</span><b>${fmtLV(S.wallet)} LV</b></div>
      <div class="rowline"><span>已存入</span><b>${fmtLV(S.staked)} LV</b></div>
      <div class="rowline"><span>当前年化</span><b class="pos">≈ ${(VE_APR*100).toFixed(1)}%（随回购量浮动）</b></div>
      <div class="rowline"><span>累计分红</span><b class="pos">+${fmtLV(S.divid)} LV ≈ ${fmtU(S.divid*PLV)}</b></div>
    </div>
    <div class="card">
      <h2>📒 我的小账本</h2>
      <div class="rowline"><span>买机器花掉</span><b class="neg">−${fmtU(S.miner||S.minedTotal>0?PRICE_USD:0)}</b></div>
      <div class="rowline"><span>交易摩擦成本（估）</span><b class="neg">−${fmtU(S.feeSpent)}</b></div>
      <div class="rowline"><span>累计挖出 + 分红</span><b class="pos">+${fmtU((S.minedTotal+S.divid)*PLV)}</b></div>
      <div class="rowline"><span>净收益（按现价）</span><b class="${(S.minedTotal+S.divid)*PLV-(S.miner||S.minedTotal>0?PRICE_USD:0)-S.feeSpent>=0?'pos':'neg'}">${fmtU((S.minedTotal+S.divid)*PLV-(S.miner||S.minedTotal>0?PRICE_USD:0)-S.feeSpent)}</b></div>
      <p class="sub" style="font-size:11px;margin-top:6px">LV 价格上涨时，同样的产出更值钱——这里按当前价 $0.0533 计算。</p>
    </div>`;
}

/* ---- shell ---- */
function go(v){S.view=v;if(v!=='lotto'){S.lottoState='idle';S.lottoResult=null}render()}
function setGear(k){S.gear=k;const msgs={Z:'🛌 没交易：'+(floorNow()===0?'机器停转，倒计时照走！':'宽限期内 1 倍速保底'),L:'😵 交易但亏了：'+(floorNow()===0?'没盈利 = 停转，但抽卡机会照攒':'保底 1 倍速，抽卡机会照攒'),W:'🙂 小赚 $2,000/周：约 2 倍速',B:'🐳 大赚 $20,000/周：满速 3 倍 🔥'};toast(msgs[k]);render()}
function toast(t){const el=$('toast');el.textContent=t;el.style.display='block';clearTimeout(el._h);el._h=setTimeout(()=>el.style.display='none',2400)}

function render(){
  $('sb_mon').textContent=S.mon.toLocaleString();
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.v===S.view));
  const app=$('app');
  if(matchMedia('(min-width:1024px)').matches){
    app.className='desk';
    app.innerHTML=`<div class="dcol">${vHome(true)}</div><div class="dcol">${vBoost()}</div><div class="dcol">${vLotto()}</div><div class="dcol">${vVault()}</div>`;
  }else{
    app.className='';
    app.innerHTML=({home:()=>vHome(false),boost:vBoost,lotto:vLotto,vault:vVault})[S.view]();
  }
  $('c_day').textContent=S.day;
  $('c_floor').textContent=floorNow()===1?'1×（宽限期，第42天结束）':'0×（不交易=停转）';
  $('c_ch').textContent=S.chances.toFixed(2);
}
document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>go(b.dataset.v)));
window.addEventListener('resize',()=>render());
document.getElementById('con_toggle').addEventListener('click',()=>document.getElementById('console').classList.toggle('open'));
document.querySelectorAll('.nv:not(.on)').forEach(b=>b.addEventListener('click',()=>toast('演示：该 Tab 为 LeverUp 现有页面')));
$('c_d1').addEventListener('click',()=>tick(1));
$('c_d7').addEventListener('click',()=>tick(7));
$('c_chance').addEventListener('click',()=>{S.chances+=1;render()});
$('c_reset').addEventListener('click',init);
init();
</script>
</body>
</html>
